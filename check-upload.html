<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Upload Checker - Nadhil Portfolio</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            color: white;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 15px;
        }
        .check-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            margin: 5px 0;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
        }
        .status {
            padding: 5px 10px;
            border-radius: 5px;
            font-weight: bold;
        }
        .success { background: #4CAF50; }
        .error { background: #f44336; }
        .loading { background: #ff9800; }
        button {
            background: #2196F3;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover { background: #1976D2; }
        #results { margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 File Upload Checker</h1>
        <p>Mengecek file-file penting untuk website portfolio Nadhil</p>
        
        <button onclick="checkAllFiles()">🚀 Check All Files</button>
        <button onclick="checkDNS()">🌐 Check DNS</button>
        
        <div id="results">
            <h3>File Status:</h3>
            <div id="file-checks"></div>
            
            <h3>Quick Tests:</h3>
            <div id="quick-tests"></div>
        </div>
    </div>

    <script>
        const filesToCheck = [
            { name: 'Main HTML', url: '/index.html', critical: true },
            { name: 'Main CSS', url: '/assets/index-CLiilpF5.css', critical: true },
            { name: 'Main JS', url: '/assets/index-D1ukrhXU.js', critical: true },
            { name: 'CV File', url: '/certificates/cv.pdf', critical: true },
            { name: 'Profile Image', url: '/BGZENBGIJObulat.png', critical: false },
            { name: 'Certificate Images', url: '/certificate-images/Golang.jpg', critical: false },
            { name: '3D Model', url: '/models/card.glb', critical: false },
            { name: 'Web Manifest', url: '/site.webmanifest', critical: false }
        ];

        async function checkFile(file) {
            try {
                const response = await fetch(file.url, { method: 'HEAD' });
                return {
                    ...file,
                    status: response.ok ? 'success' : 'error',
                    statusCode: response.status,
                    size: response.headers.get('content-length') || 'unknown'
                };
            } catch (error) {
                return {
                    ...file,
                    status: 'error',
                    statusCode: 'Network Error',
                    error: error.message
                };
            }
        }

        async function checkAllFiles() {
            const resultsDiv = document.getElementById('file-checks');
            resultsDiv.innerHTML = '<p>🔄 Checking files...</p>';
            
            const results = await Promise.all(filesToCheck.map(checkFile));
            
            let html = '';
            let criticalErrors = 0;
            
            results.forEach(result => {
                const statusClass = result.status === 'success' ? 'success' : 'error';
                if (result.status === 'error' && result.critical) criticalErrors++;
                
                html += `
                    <div class="check-item">
                        <span>${result.name} ${result.critical ? '(Critical)' : ''}</span>
                        <span class="status ${statusClass}">
                            ${result.status === 'success' ? '✅ OK' : '❌ Failed'} 
                            (${result.statusCode})
                        </span>
                    </div>
                `;
            });
            
            if (criticalErrors > 0) {
                html = `<div style="background: #f44336; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
                    <strong>⚠️ ${criticalErrors} Critical File(s) Missing!</strong><br>
                    Website tidak akan berfungsi dengan benar.
                </div>` + html;
            } else {
                html = `<div style="background: #4CAF50; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
                    <strong>✅ All Critical Files OK!</strong><br>
                    Masalah mungkin di DNS atau konfigurasi server.
                </div>` + html;
            }
            
            resultsDiv.innerHTML = html;
        }

        function checkDNS() {
            const testsDiv = document.getElementById('quick-tests');
            testsDiv.innerHTML = `
                <div class="check-item">
                    <span>Current URL</span>
                    <span>${window.location.href}</span>
                </div>
                <div class="check-item">
                    <span>User Agent</span>
                    <span>${navigator.userAgent.substring(0, 50)}...</span>
                </div>
                <div class="check-item">
                    <span>Connection</span>
                    <span class="status ${navigator.onLine ? 'success' : 'error'}">
                        ${navigator.onLine ? '✅ Online' : '❌ Offline'}
                    </span>
                </div>
                <div style="margin-top: 15px;">
                    <p><strong>Manual Tests:</strong></p>
                    <p>1. Try: <a href="http://nadhilportfolio.site/index.html" target="_blank" style="color: #2196F3;">http://nadhilportfolio.site/index.html</a></p>
                    <p>2. Try: <a href="http://nadhilportfolio.site/test.html" target="_blank" style="color: #2196F3;">http://nadhilportfolio.site/test.html</a></p>
                    <p>3. Try from mobile data (different network)</p>
                </div>
            `;
        }

        // Auto-run checks when page loads
        window.onload = function() {
            checkAllFiles();
            checkDNS();
        };
    </script>
</body>
</html>
